name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.26.x]

    steps:
      - name: Set up ${{ matrix.go-version }}
        uses: actions/setup-go@latest
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout code
        uses: actions/checkout@latest

      - name: Test (race)
        run: go test -race ./...
